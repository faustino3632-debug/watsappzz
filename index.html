<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat en Vivo</title>
    <style>
        body { font-family: sans-serif; background-color: #e5ddd5; display: flex; flex-direction: column; align-items: center; margin: 0; height: 100vh; }
        #chat { width: 90%; max-width: 500px; height: 70vh; background: white; overflow-y: scroll; padding: 20px; border-radius: 10px; margin-top: 20px; display: flex; flex-direction: column; }
        .msg { margin: 8px 0; padding: 10px 15px; border-radius: 18px; max-width: 70%; position: relative; }
        .mio { background-color: #dcf8c6; align-self: flex-end; }
        .otro { background-color: #ffffff; border: 1px solid #ddd; align-self: flex-start; }
        #input-area { width: 90%; max-width: 500px; display: flex; padding: 10px 0; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        button { margin-left: 10px; padding: 10px 20px; border-radius: 20px; border: none; background-color: #00a884; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chat"></div>
    <div id="input-area">
        <input id="msg" placeholder="Escribe un mensaje...">
        <button onclick="enviar()">Enviar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        // Tu configuración con la URL que me diste
        const firebaseConfig = { databaseURL: "https://proyecto-xd-9-default-rtdb.firebaseio.com/" };
        const db = getDatabase(initializeApp(firebaseConfig));
        
        const nombre = prompt("¿Cómo te llamas?") || "Anónimo";

        window.enviar = () => {
            const input = document.getElementById("msg");
            if (input.value.trim() !== "") {
                push(ref(db, 'mensajes/'), { user: nombre, text: input.value });
                input.value = '';
            }
        };

        onValue(ref(db, 'mensajes/'), (snapshot) => {
            const chat = document.getElementById("chat");
            chat.innerHTML = "";
            const data = snapshot.val() || {};
            Object.values(data).forEach(m => {
                const div = document.createElement('div');
                div.className = 'msg ' + (m.user === nombre ? 'mio' : 'otro');
                div.innerHTML = `<b>${m.user}:</b> ${m.text}`;
                chat.appendChild(div);
            });
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
